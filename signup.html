<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your ShopEase account" />
  <title>Sign Up — ShopEase</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="signup">

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo" aria-label="ShopEase home">
        <div class="nav-logo-icon" aria-hidden="true">🛍</div>
        ShopEase
      </a>

      <ul class="nav-menu" id="nav-menu" role="list">
        <li><a href="index.html"    class="nav-link">Home</a></li>
        <li><a href="products.html" class="nav-link">Products</a></li>
        <li><a href="cart.html"     class="nav-link">Cart</a></li>
      </ul>

      <div class="nav-actions">
        <a href="cart.html" class="nav-cart" aria-label="Shopping cart">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            aria-hidden="true">
            <circle cx="9"  cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="cart-badge" aria-live="polite">0</span>
        </a>
        <div class="auth-links"></div>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>

  <main>
    <section class="auth-section">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-icon">🚀</div>
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">Join ShopEase and start shopping smarter</p>
        </div>

        <form id="signup-form" novalidate>
          <div class="form-group">
            <label for="signup-name" class="form-label">Full Name</label>
            <input type="text" id="signup-name" class="form-input" placeholder="John Doe" autocomplete="name" required />
          </div>

          <div class="form-group">
            <label for="signup-email" class="form-label">Email Address</label>
            <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
          </div>

          <div class="form-group">
            <label for="signup-password" class="form-label">Password</label>
            <input type="password" id="signup-password" class="form-input" placeholder="At least 6 characters" autocomplete="new-password" required />
          </div>

          <div class="form-group">
            <label for="signup-confirm" class="form-label">Confirm Password</label>
            <input type="password" id="signup-confirm" class="form-input" placeholder="Re-enter your password" autocomplete="new-password" required />
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="signup-btn">
            Create Account
          </button>
        </form>

        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <button class="btn btn-google btn-full" id="google-signup-btn">
          <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.01 24.01 0 0 0 0 21.56l7.98-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Continue with Google
        </button>

        <p class="auth-footer-text">
          Already have an account? <a href="login.html" class="form-link">Log in</a>
        </p>
      </div>
    </section>
  </main>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <script src="js/firebase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/firestore.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>

  <script>
    // ── Sign-up form handler ──
    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("signup-name").value.trim();
      const email = document.getElementById("signup-email").value.trim();
      const password = document.getElementById("signup-password").value;
      const confirm = document.getElementById("signup-confirm").value;
      const btn = document.getElementById("signup-btn");

      if (!name || !email || !password || !confirm) {
        showToast("Please fill in all fields.", "error");
        return;
      }
      if (password !== confirm) {
        showToast("Passwords do not match.", "error");
        return;
      }
      if (password.length < 6) {
        showToast("Password must be at least 6 characters.", "error");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Creating account…";

      try {
        await signUpWithEmail(email, password, name);
        window.location.href = "index.html";
      } catch {
        btn.disabled = false;
        btn.textContent = "Create Account";
      }
    });

    // ── Google sign-up ──
    document.getElementById("google-signup-btn").addEventListener("click", async () => {
      try {
        await loginWithGoogle();
        window.location.href = "index.html";
      } catch { /* error already shown via toast */ }
    });

    // Redirect if already logged in
    auth.onAuthStateChanged((user) => {
      if (user) window.location.href = "index.html";
    });
  </script>
</body>
</html>
